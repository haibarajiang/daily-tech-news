name: Daily Tech Digest

# ============================
# Secrets 配置说明
# ============================
# 在 GitHub 仓库设置中添加以下 Secrets:
#
# 1. ANTHROPIC_API_KEY
#    - SiliconFlow API Key（Anthropic 兼容格式）
#    - 获取地址: https://siliconflow.cn/
#
# 2. ANTHROPIC_BASE_URL (可选)
#    - API 端点地址，默认使用 SiliconFlow: https://api.siliconflow.cn/v1
# ============================

on:
  schedule:
    # 每天 UTC 00:10 运行 = 北京时间 8:10（避开整点高峰，减少延迟）
    - cron: '10 0 * * *'
  workflow_dispatch:
  # Push trigger on workflow file changes helps ensure the schedule stays active
  push:
    branches:
      - main
    paths:
      - '.github/workflows/daily-tech-digest.yml'

jobs:
  generate-digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          uv pip install --system -r requirements.txt

      - name: Generate digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_BASE_URL: ${{ secrets.ANTHROPIC_BASE_URL }}
        run: |
          echo "生成 Daily Tech News..."
          python scripts/tech_digest.py

      - name: Generate HTML pages
        run: |
          python scripts/generate_page.py
          python scripts/generate_html.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 检查是否有变更
          if git diff --quiet && git diff --cached --quiet; then
            echo "没有新的简报生成"
            exit 0
          fi

          # 获取日期
          DATE=$(TZ='Asia/Shanghai' date +%Y-%m-%d)

          # 提交变更
          git add digests/ index.html
          git add page-*.html || true
          git commit -m "📰 Daily digest: ${DATE}"
          git push

